name: Convertir PDF a Markdown

on:
  push:   # se ejecuta en cualquier cambio

jobs:
  convertir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Instalar pdftotext
        run: sudo apt-get install -y poppler-utils
      - name: Convertir PDF a TXT
        run: pdftotext *.pdf salida.txt
      - name: Guardar como Markdown
        run: mv salida.txt resultado.md
      - name: Subir resultado
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add resultado.md
          git commit -m "PDF convertido a Markdown"
          git push
