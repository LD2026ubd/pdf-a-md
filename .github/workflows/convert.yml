name: Convertir PDF a Markdown

on:
  push:   # se ejecuta en cualquier cambio

jobs:
  convertir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Instalar Pandoc
        run: sudo apt-get install -y pandoc
      - name: Convertir PDF
        run: pandoc *.pdf -o resultado.md
      - name: Guardar resultado
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add resultado.md
          git commit -m "PDF convertido a Markdown"
          git push
